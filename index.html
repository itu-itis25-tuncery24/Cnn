<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Günün Reçetesi </title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --main-color: #ff6b81; /* Tatlı bir mercan/pembe */
            --bg-gradient: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); /* Sabah güneşi tonları */
            --text-color: #555;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body {
            background-image: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Nunito', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 380px;
            padding: 40px 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(252, 182, 159, 0.4);
            transition: 0.5s ease;
        }

        .sun-icon {
            font-size: 3.5rem;
            color: #ffa502;
            margin-bottom: 15px;
            animation: pulseSun 3s infinite ease-in-out;
        }

        @keyframes pulseSun {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px #ffa502; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        h2 { font-weight: 800; margin-bottom: 10px; color: var(--main-color); font-size: 1.8rem; }
        p { font-weight: 600; font-size: 1rem; opacity: 0.8; margin-bottom: 30px; line-height: 1.5; }

        button.main-btn {
            background: var(--main-color);
            color: #fff;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(255, 107, 129, 0.4);
            width: 100%;
            font-family: 'Nunito', sans-serif;
        }

        button.main-btn:active { transform: scale(0.95); }

        /* Adım 2: Reçete Ekranı */
        #step-2 { display: none; text-align: left; }
        
        .recipe-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px dashed #ffb8b8;
            padding-bottom: 15px;
        }

        .recipe-header h2 { font-size: 1.5rem; color: var(--text-color); }
        .recipe-header span { color: var(--main-color); font-weight: 800; }

        .trait {
            display: flex;
            align-items: center;
            margin: 18px 0;
            padding: 16px;
            background: #fff;
            border-radius: 18px;
            font-size: 0.95rem;
            font-weight: 700;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.6s forwards;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border-left: 4px solid var(--main-color);
        }

        .trait i { margin-right: 15px; font-size: 1.5rem; color: var(--main-color); width: 25px; text-align: center; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="container" id="step-1">
        <i class="fas fa-sun sun-icon"></i>
        <h2>☀️</h2>
        
        <button type="button" class="main-btn" onclick="openRecipe()">Reçeteyi Aç 💊</button>
    </div>

    <div class="container" id="step-2">
        <div class="recipe-header">
            <h2>Rx: <span>Sabah Dozu</span></h2>
            <p style="font-size: 0.85rem; margin-top: 5px; margin-bottom: 0;">Hasta: Dünyanın En Tatlı Hemşiresi</p>
        </div>
        
        <div id="resultsArea"></div>
    </div>

    <script>
        // Uzun basma menülerini engelle (Yine pürüzsüz çalışması için)
        document.addEventListener('contextmenu', event => event.preventDefault());

        function openRecipe() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            showResults();
        }

        function showResults() {
            const results = [
                { text: "Birazcık özlem (Yan etkisi: Sürekli seni düşünmek) 🥺", icon: "fas fa-thermometer-full" },
                { text: "Bolca gülümseme (Çünkü gülüşü çokkk güzel)", icon: "fas fa-smile-beam" },
                { text: "Ve Mucit Bey'den kocaman bir Günaydın! ❤️", icon: "fas fa-heart" }
            ];

            const area = document.getElementById('resultsArea');
            area.innerHTML = ""; 
            
            results.forEach((item, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = `trait`;
                    div.innerHTML = `<i class="${item.icon}"></i> <span>${item.text}</span>`;
                    area.appendChild(div);
                }, index * 1000); // Reçete maddeleri 1'er saniye arayla tatlı tatlı belirir
            });
        }
    </script>
</body>
</html>
