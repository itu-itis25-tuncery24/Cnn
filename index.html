<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Günaydın ☀️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #fdfbfb;
            background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        .scene {
            width: 320px;
            height: 450px;
            perspective: 1000px; 
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            /* Dönüş animasyonu süresi ve yumuşaklığı */
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* 1. Dönüş (180 derece) */
        .card.is-flipped {
            transform: rotateY(180deg);
        }

        /* 2. Dönüş (360 derece - Final) */
        .card.is-flipped-twice {
            transform: rotateY(360deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        .card-front {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
        }

        .card-front h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.8rem; /* Uzun yazı için boyutu estetik hale getirdim */
            line-height: 1.2;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            padding: 0 10px;
        }

        .tap-hint {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.3);
            padding: 8px 15px;
            border-radius: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .card-back {
            background: #fffafa; 
            color: #444;
            transform: rotateY(180deg);
            border: 2px solid #fecfef;
        }

        .message-item {
            margin: 20px 0;
            text-align: left;
            width: 100%;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .card.is-flipped .message-item:nth-child(1) { transition-delay: 0.4s; opacity: 1; transform: translateY(0); }
        .card.is-flipped .message-item:nth-child(2) { transition-delay: 1.2s; opacity: 1; transform: translateY(0); }
        .card.is-flipped .message-item:nth-child(3) { transition-delay: 2.0s; opacity: 1; transform: translateY(0); }

        .message-item h3 {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }

        .message-item h3 span {
            font-size: 1.5rem;
            margin-right: 10px;
        }

        .message-item p {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            color: #ff6b81;
            line-height: 1.2;
            padding-left: 35px;
        }

    </style>
</head>
<body>

    <div class="scene" onclick="flipCard()">
        <div class="card" id="myCard">
            
            <div class="card-face card-front" id="frontFace">
                <h1>Sabahınıza eşlik edecek<br>ufak bir mesaj...</h1>
                <div class="tap-hint" id="tapHint">Açmak için dokun 👆</div>
            </div>

            <div class="card-face card-back">
                
                <div class="message-item">
                    <h3><span>☁️</span> İçimde kocaman...</h3>
                    <p>Sana olan bir özlem.</p>
                </div>

                <div class="message-item">
                    <h3><span>✨</span> Aklımda hep...</h3>
                    <p>O çokkk güzel gülüşün.</p>
                </div>

                <div class="message-item">
                    <h3><span>❤️</span> Ve dudaklarımda...</h3>
                    <p>Mucit Bey'den sana kocaman bir GÜNAYDIN!</p>
                </div>

            </div>

        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        function flipCard() {
            const card = document.getElementById('myCard');
            
            // Eğer kart henüz dönmemişse ilk dönüşü başlat
            if (!card.classList.contains('is-flipped') && !card.classList.contains('is-flipped-twice')) {
                card.classList.add('is-flipped');

                // 6.5 saniye bekle (yazıların tek tek gelip okunma süresi)
                setTimeout(() => {
                    // Kartın arkası dönükken, ön yüzün içeriğini final mesajıyla değiştir
                    const frontFace = document.getElementById('frontFace');
                    frontFace.innerHTML = `
                        <div style="font-size: 4rem; margin-bottom: 10px;">🤍</div>
                        <h1 style="font-size: 3.5rem; line-height: 1.2;">günaydın<br>sevgilimmm</h1>
                    `;

                    // İkinci dönüşü tetikle (Kart aynı yönde bir tur daha döner)
                    card.classList.remove('is-flipped');
                    card.classList.add('is-flipped-twice');
                }, 6500); 
            }
        }
    </script>
</body>
</html>
