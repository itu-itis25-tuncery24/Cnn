<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heart Surface - Fixed UI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    font-family: 'Georgia', serif;
    touch-action: none;
  }
  #equations {
    color: rgba(255, 180, 210, 0.9);
    font-size: 11px;
    line-height: 1.5;
    text-align: center;
    padding: 15px 10px 10px;
    text-shadow: 0 0 10px rgba(255, 80, 140, 0.5);
    pointer-events: none;
    z-index: 10;
  }
  #btn {
    background: transparent;
    border: 1px solid rgba(255, 100, 160, 0.5);
    color: rgba(255, 160, 200, 0.9);
    padding: 8px 25px;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 1.5px;
    cursor: pointer;
    margin-bottom: 5px;
    z-index: 10;
    transition: all 0.3s;
  }
  #canvas { 
    position: absolute;
    top: 0;
    left: 0;
    width: 100%; 
    height: 100%;
    z-index: 1;
  }
</style>
</head>
<body>

<div id="equations">
  x = [4 sin u &minus; sin(3u)] sin v<br>
  y = 2.2 cos v<br>
  z = (4 cos u &minus; cos(2u) &minus; cos(3u)/2) sin v
</div>

<button id="btn">OLUŞTUR</button>
<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const btn    = document.getElementById('btn');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setClearColor(0x000000, 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 25); // Mesafe sabit (küçük görünmesi için)
camera.lookAt(0, 0, 0);

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

function heartPt(u, v) {
  const ox = (4 * Math.sin(u) - Math.sin(3 * u)) * Math.sin(v);
  const oy = 2.2 * Math.cos(v); 
  const oz = 1.0 * (4 * Math.cos(u) - Math.cos(2 * u) - Math.cos(3 * u) / 2) * Math.sin(v);
  return new THREE.Vector3(ox, oz, oy);
}

const group = new THREE.Group();
// Kalbi sahne içinde yukarı kaydırıyoruz (Yazının hemen altına denk gelecek şekilde)
group.position.y = 4.5; 
scene.add(group);

const U = 72, V = 36;
const allSegments = [];
for (let i = 0; i <= U; i++) {
  const u = (i / U) * Math.PI * 2;
  const pts = [];
  for (let j = 0; j <= V; j++) pts.push(heartPt(u, (j / V) * Math.PI));
  const angle = (i / U) * Math.PI * 2;
  const phase = Math.abs(Math.sin(angle / 2));
  allSegments.push({ pts, phase });
}
for (let j = 0; j <= V; j++) {
  const v = (j / V) * Math.PI;
  const pts = [];
  for (let i = 0; i <= U; i++) pts.push(heartPt((i / U) * Math.PI * 2, v));
  const phase = Math.abs(Math.cos(v)); 
  allSegments.push({ pts, phase });
}

const ANIM_DURATION = 4500; 
const RAMP          = 0.40; 
let lines = [], animStart = null;

function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

function buildAllLines() {
  while (group.children.length) group.remove(group.children[0]);
  lines = [];
  for (const seg of allSegments) {
    const mat  = new THREE.LineBasicMaterial({ color: 0xff3377, transparent: true, opacity: 0 });
    const geom = new THREE.BufferGeometry().setFromPoints(seg.pts);
    const line = new THREE.Line(geom, mat);
    group.add(line);
    lines.push({ mat, phase: seg.phase });
  }
}

btn.addEventListener('click', () => {
  buildAllLines();
  animStart = performance.now();
  btn.textContent = '...';
  btn.style.pointerEvents = 'none';
});

let rotX = 0, rotY = 0, dragging = false, px = 0, py = 0, scale = 1, prevDist = 0;

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { dragging = true; px = e.touches[0].clientX; py = e.touches[0].clientY; }
  else if (e.touches.length === 2) { prevDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    rotY += (e.touches[0].clientX - px) * 0.01;
    rotX += (e.touches[0].clientY - py) * 0.01;
    px = e.touches[0].clientX; py = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    scale = Math.max(0.4, Math.min(2.5, scale * (d / prevDist)));
    prevDist = d;
  }
}, { passive: true });

canvas.addEventListener('touchend', () => dragging = false);

function animate() {
  requestAnimationFrame(animate);
  if (animStart !== null) {
    const t = Math.min((performance.now() - animStart) / ANIM_DURATION, 1);
    for (const { mat, phase } of lines) {
      const localT = Math.max(0, Math.min(1, (t - (phase * (1 - RAMP))) / RAMP));
      mat.opacity  = easeInOutSine(localT) * 0.8;
    }
    if (t >= 1) { animStart = null; btn.textContent = 'OLUŞTUR'; btn.style.pointerEvents = 'auto'; }
  }
  group.rotation.x = rotX;
  group.rotation.y = rotY;
  group.scale.setScalar(scale);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
