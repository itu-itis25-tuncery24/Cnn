<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heart Surface</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    font-family: 'Georgia', serif;
    touch-action: none;
  }
  #equations {
    color: rgba(255, 180, 210, 0.9);
    font-size: 13px;
    line-height: 2;
    text-align: center;
    padding: 22px 20px 14px;
    text-shadow: 0 0 10px rgba(255, 80, 140, 0.5);
    letter-spacing: 0.5px;
    pointer-events: none;
  }
  #btn {
    background: transparent;
    border: 1px solid rgba(255, 100, 160, 0.5);
    color: rgba(255, 160, 200, 0.85);
    padding: 9px 28px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 1.5px;
    cursor: pointer;
    margin-bottom: 10px;
    font-family: 'Georgia', serif;
    transition: border-color 0.3s, color 0.3s;
  }
  #btn:hover {
    border-color: rgba(255, 100, 160, 0.9);
    color: rgba(255, 200, 230, 1);
  }
  #canvas { flex: 1; display: block; width: 100%; }
</style>
</head>
<body>

<div id="equations">
  x = [4 sin u &minus; sin(3u)] sin v<br>
  y = 2 cos v<br>
  z = 1.2 (4 cos u &minus; cos(2u) &minus; cos(3u)/2) sin v
</div>

<button id="btn">OLUŞTUR</button>
<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const btn    = document.getElementById('btn');

function getH() {
  return window.innerHeight
    - document.getElementById('equations').offsetHeight
    - document.getElementById('btn').offsetHeight - 24;
}

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setClearColor(0x000000, 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / getH(), 0.1, 100);
camera.position.set(0, 0, 13);
camera.lookAt(0, 0, 0);

function resize() {
  const h = getH();
  renderer.setSize(window.innerWidth, h);
  camera.aspect = window.innerWidth / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ---- Kalp parametrik ----
function heartPt(u, v) {
  const ox = (4 * Math.sin(u) - Math.sin(3 * u)) * Math.sin(v);
  const oy = 2 * Math.cos(v);
  const oz = 1.2 * (4 * Math.cos(u) - Math.cos(2 * u) - Math.cos(3 * u) / 2) * Math.sin(v);
  return new THREE.Vector3(ox, oz, oy);
}

const U = 72, V = 36;
const group = new THREE.Group();
scene.add(group);

// ---- Tüm çizgileri önceden hesapla ----
// Her segment için phase: 0..1 — animasyon dalgasındaki konumu
const allSegments = [];

// U çizgileri (meridyen) — kalbin etrafını saran dikey çizgiler
for (let i = 0; i <= U; i++) {
  const u = (i / U) * Math.PI * 2;
  const pts = [];
  for (let j = 0; j <= V; j++) pts.push(heartPt(u, (j / V) * Math.PI));
  // Dalga merkezden (u=π/2 ≈ sol veya sağ tepe) dışa doğru yayılsın
  const angle = (i / U) * Math.PI * 2;
  // 0..1: en ortada olan çizgiler önce gelsin
  const phase = Math.abs(Math.sin(angle / 2));
  allSegments.push({ pts, phase });
}

// V çizgileri (enlem) — yukarıdan aşağıya v değişir
for (let j = 0; j <= V; j++) {
  const v = (j / V) * Math.PI;
  const pts = [];
  for (let i = 0; i <= U; i++) pts.push(heartPt((i / U) * Math.PI * 2, v));
  // v=0 tepe (kanatlar arası), v=π sivri uç
  // Ortadan (v≈π/2 en geniş yer) başlayıp uçlara doğru yayılsın
  const phase = Math.abs(Math.cos(v)); // 0 orta, 1 uçlar
  allSegments.push({ pts, phase });
}

// ---- Animasyon parametreleri ----
const ANIM_DURATION = 2400; // ms
const RAMP          = 0.30; // fade-in süresi (normalize 0..1)

let lines      = [];
let animStart  = null;

function easeOutQuart(t) {
  return 1 - Math.pow(1 - t, 4);
}

function easeInOutSine(t) {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

function buildAllLines() {
  while (group.children.length) group.remove(group.children[0]);
  lines = [];

  for (const seg of allSegments) {
    const mat  = new THREE.LineBasicMaterial({ color: 0xff3377, transparent: true, opacity: 0 });
    const geom = new THREE.BufferGeometry().setFromPoints(seg.pts);
    const line = new THREE.Line(geom, mat);
    group.add(line);
    lines.push({ mat, phase: seg.phase });
  }
}

function startAnimation() {
  buildAllLines();
  animStart = performance.now();
  btn.textContent = '...';
  btn.style.pointerEvents = 'none';
}

btn.addEventListener('click', startAnimation);

// ---- Dokunma / Fare ----
let rotX = 0, rotY = 0;
let dragging = false, px = 0, py = 0;
let scale = 1, prevDist = 0;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    dragging = true; px = e.touches[0].clientX; py = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    prevDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    rotY += (e.touches[0].clientX - px) * 0.012;
    rotX += (e.touches[0].clientY - py) * 0.012;
    px = e.touches[0].clientX; py = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    scale = Math.max(0.4, Math.min(2.8, scale * (d / prevDist)));
    prevDist = d;
  }
}, { passive: false });

canvas.addEventListener('touchend',  () => { dragging = false; });
canvas.addEventListener('mousedown', e  => { dragging = true; px = e.clientX; py = e.clientY; });
canvas.addEventListener('mousemove', e  => {
  if (!dragging) return;
  rotY += (e.clientX - px) * 0.008;
  rotX += (e.clientY - py) * 0.008;
  px = e.clientX; py = e.clientY;
});
canvas.addEventListener('mouseup',  () => { dragging = false; });
canvas.addEventListener('wheel', e => { scale = Math.max(0.4, Math.min(2.8, scale - e.deltaY * 0.001)); });

// ---- Ana döngü ----
function animate() {
  requestAnimationFrame(animate);

  if (animStart !== null) {
    const elapsed = performance.now() - animStart;
    const t = Math.min(elapsed / ANIM_DURATION, 1); // 0..1 global zaman

    for (const { mat, phase } of lines) {
      // phase=0: ilk görünen, phase=1: en son görünen
      // Her çizginin kendi başlangıç zamanı
      const startT = phase * (1 - RAMP);
      const localT = Math.max(0, Math.min(1, (t - startT) / RAMP));
      mat.opacity  = easeInOutSine(localT) * 0.82;
    }

    if (t >= 1) {
      animStart = null;
      btn.textContent = 'OLUŞTUR';
      btn.style.pointerEvents = 'auto';
    }
  }

  group.rotation.x = rotX;
  group.rotation.y = rotY;
  group.scale.setScalar(scale);
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
